<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>TabFlow Pro — 설정</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-0:#07080c;--bg-1:#0d0f16;--bg-2:#13161f;--bg-3:#191d2a;
      --border-0:#1e2235;--border-1:#2a2f48;
      --text-0:#eceef4;--text-1:#b0b5cc;--text-2:#7a81a0;--text-3:#525878;
      --accent:#3b82f6;--accent-l:#60a5fa;
      --green:#22c55e;--red:#ef4444;
      --r:10px;--r-sm:6px;
      --t:.18s cubic-bezier(.4,0,.2,1);
      --font:'DM Sans',sans-serif;--mono:'JetBrains Mono',monospace;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:var(--font);background:var(--bg-0);color:var(--text-0);max-width:640px;margin:0 auto;padding:24px}
    h1{font-size:18px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:8px}
    .section{background:var(--bg-2);border:1px solid var(--border-0);border-radius:var(--r);padding:18px;margin-bottom:14px}
    .section h3{font-size:13px;margin-bottom:10px;display:flex;align-items:center;gap:7px}
    .row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(30,34,53,.3)}
    .row:last-child{border-bottom:none}
    .label{font-size:12px;color:var(--text-1)}
    .label small{display:block;font-size:10px;color:var(--text-3);margin-top:1px}
    .tog{width:36px;height:18px;border-radius:9px;background:var(--border-1);cursor:pointer;position:relative;transition:var(--t)}
    .tog.on{background:var(--accent)}
    .tog::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;top:2px;left:2px;transition:var(--t)}
    .tog.on::after{left:20px}
    .btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--r-sm);font-size:11.5px;font-weight:500;cursor:pointer;transition:var(--t);border:1px solid var(--border-1);background:var(--bg-3);color:var(--text-2);margin-top:8px}
    .btn:hover{background:var(--bg-1);color:var(--text-0);border-color:var(--accent)}
    .btn-p{background:var(--accent);color:#fff;border-color:var(--accent)}
    .saved{color:var(--green);font-size:11px;margin-left:8px;opacity:0;transition:.3s}
    .saved.show{opacity:1}
    .rule{display:flex;align-items:center;gap:7px;padding:4px 0;font-size:11px}
    .rule-dot{width:8px;height:8px;border-radius:2px}
    .rule-kw{color:var(--text-3);font-family:var(--mono);font-size:9.5px}
  </style>
</head>
<body>
  <h1>⚙️ TabFlow Pro 설정</h1>

  <div class="section">
    <h3>☁️ 동기화</h3>
    <div class="row">
      <div class="label">자동 동기화<small>열린 윈도우와 탭을 자동으로 동기화</small></div>
      <div class="tog" data-key="autoSync" id="tog-autoSync"></div>
    </div>
    <div class="row">
      <div class="label">복구 시 Discard<small>복구할 때 Discard 상태로 로드</small></div>
      <div class="tog" data-key="discardOnRestore" id="tog-discardOnRestore"></div>
    </div>
    <div class="row">
      <div class="label">북마크 동기화<small>북마크도 함께 동기화</small></div>
      <div class="tog" data-key="syncBookmarks" id="tog-syncBookmarks"></div>
    </div>
  </div>

  <div class="section">
    <h3>🤖 자동 분류</h3>
    <div class="row">
      <div class="label">탭 자동 그룹<small>키워드 기반 자동 탭 분류</small></div>
      <div class="tog" data-key="autoGroupTabs" id="tog-autoGroupTabs"></div>
    </div>
    <div class="row">
      <div class="label">북마크 자동 정리<small>AI 기반 카테고리 자동 분류</small></div>
      <div class="tog" data-key="autoClassifyBookmarks" id="tog-autoClassifyBookmarks"></div>
    </div>
    <div style="margin-top:8px;font-size:11px;color:var(--text-2)">분류 규칙:</div>
    <div id="rules"></div>
  </div>

  <div class="section">
    <h3>💤 메모리 관리</h3>
    <div class="row">
      <div class="label">자동 Discard<small>비활성 탭을 자동으로 Discard</small></div>
      <div class="tog" data-key="autoDiscard" id="tog-autoDiscard"></div>
    </div>
  </div>

  <div class="section">
    <h3>📥 데이터</h3>
    <button class="btn" id="exportBtn">📥 JSON 내보내기</button>
    <button class="btn" id="importBtn">📤 JSON 가져오기</button>
    <input type="file" id="fileInput" accept=".json" style="display:none">
    <span class="saved" id="saved">✅ 저장됨</span>
  </div>

  <script src="options.js"></script>
</body>
</html>
