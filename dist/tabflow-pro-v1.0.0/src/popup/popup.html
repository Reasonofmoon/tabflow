<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Moon-TabFlow</title>
  <style>
    :root {
      --bg-0: #07080c; --bg-1: #0d0f16; --bg-2: #13161f; --bg-3: #191d2a;
      --border-0: #1e2235; --border-1: #2a2f48;
      --text-0: #eceef4; --text-1: #b0b5cc; --text-2: #7a81a0; --text-3: #525878;
      --accent: #3b82f6; --accent-l: #60a5fa;
      --green: #22c55e; --yellow: #eab308; --red: #ef4444;
      --r: 10px; --r-sm: 6px;
      --t: .18s cubic-bezier(.4,0,.2,1);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Segoe UI', -apple-system, sans-serif; background:var(--bg-0); color:var(--text-0); width:320px; padding:16px; }
    .header { display:flex; align-items:center; gap:8px; margin-bottom:14px; }
    .logo-mark { width:24px;height:24px;border-radius:6px;background:linear-gradient(135deg,var(--accent),#a855f7);display:flex;align-items:center;justify-content:center;font-size:11px; }
    h1 { font-size:14px; font-weight:700; }
    .ver { font-size:8px;color:var(--text-3);background:var(--bg-3);padding:1px 5px;border-radius:3px; }
    .stats { display:flex; gap:8px; margin-bottom:14px; }
    .stat-card { flex:1; background:var(--bg-2); border:1px solid var(--border-0); border-radius:var(--r-sm); padding:10px; text-align:center; }
    .stat-num { font-size:20px; font-weight:700; }
    .stat-label { font-size:9px; color:var(--text-3); margin-top:2px; }
    .actions { display:flex; flex-direction:column; gap:6px; }
    .btn {
      display:flex; align-items:center; gap:7px; width:100%;
      padding:9px 12px; border-radius:var(--r-sm); font-size:12px; font-weight:500;
      cursor:pointer; transition:var(--t); border:1px solid var(--border-1);
      background:var(--bg-3); color:var(--text-1); font-family:inherit;
    }
    .btn:hover { background:var(--bg-2); color:var(--text-0); border-color:var(--accent); }
    .btn-p { background:var(--accent); color:#fff; border-color:var(--accent); }
    .btn-p:hover { background:var(--accent-l); }
    .btn-icon { font-size:14px; }
    .result { font-size:11px; color:var(--green); margin-top:6px; text-align:center; opacity:0; transition:.3s; }
    .result.show { opacity:1; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-mark">⚡</div>
    <h1>Moon-TabFlow</h1>
    <span class="ver">v1.0</span>
  </div>
  <div class="stats">
    <div class="stat-card">
      <div class="stat-num" id="tabCount" style="color:var(--accent)">0</div>
      <div class="stat-label">열린 탭</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="winCount" style="color:var(--green)">0</div>
      <div class="stat-label">윈도우</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="bmCount" style="color:var(--yellow)">0</div>
      <div class="stat-label">북마크</div>
    </div>
  </div>
  <div class="actions">
    <button class="btn btn-p" id="openSidePanel"><span class="btn-icon">📋</span>사이드 패널 열기</button>
    <button class="btn" id="discardInactive"><span class="btn-icon">💤</span>비활성 탭 Discard</button>
    <button class="btn" id="closeDups"><span class="btn-icon">🔄</span>중복 탭 닫기</button>
  </div>
  <div class="result" id="result"></div>
  <script src="popup.js"></script>
</body>
</html>
